name: Publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  github-release:
    name: GitHub Release
    uses: tree-sitter/workflows/.github/workflows/release.yml@main
    with:
      generate: true

  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Set up tree-sitter CLI
        uses: tree-sitter/setup-action/cli@v2

      - name: Generate parsers
        run: |
          for dir in tree-sitter-openapi tree-sitter-openapi-json; do
            (cd "$dir" && tree-sitter generate)
          done

      - name: Build WASM
        run: |
          for dir in tree-sitter-openapi tree-sitter-openapi-json; do
            npx tree-sitter build --wasm "$dir"
          done

      - name: Build Node prebuilds
        run: npx prebuildify -t 20.19.5

      - name: Publish to npm (trusted publishing)
        run: npm publish --provenance --access public

  crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io (trusted publishing)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish crate
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
