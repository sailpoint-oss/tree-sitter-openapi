name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test parsers
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up tree-sitter CLI
        uses: tree-sitter/setup-action/cli@v2

      - name: Install Node dependencies
        run: npm ci

      - name: Run grammar tests
        run: make test

      - name: Run Rust tests
        run: cargo test

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run Go binding tests
        run: go test ./bindings/go/...

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Python binding tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[core]"
          python -m unittest discover -s bindings/python/tests

      - name: Run Node binding tests
        run: npm test
